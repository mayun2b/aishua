spring:
  datasource:
    url: jdbc:mysql://localhost:3306/aishua?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2B8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

ai:
  qwen:
    chat-api: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
    api-key: sk-e61dc444fb6f4503965af827b50a4ab0
    chat-model: qwen3.5-flash
    chat-max-tokens: 220

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  mapper-locations: classpath*:mapper/**/*.xml

minio:
  endpoint: http://localhost:9000
  accesskey: minioadmin
  secretkey: minioadmin
  bucket-name: subject

practice:
  mastery:
    # 样本量达到该阈值后，按正确率稳定分级
    min-sample-count: 20
    # 正确率阈值（百分比）
    rate-level-1: 60
    rate-level-2: 75
    rate-level-3: 90
    # 小样本阶段的最高等级限制（0-3）
    warmup-level-cap: 2
