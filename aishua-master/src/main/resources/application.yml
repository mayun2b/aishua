spring:
  datasource:
    url: jdbc:mysql://localhost:3306/aishua?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2B8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

app:
  http:
    client:
      connect-timeout: 8s
      read-timeout: 45s
  cors:
    path-pattern: /api/**
    allowed-origin-patterns:
      - "*"
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: false
    max-age-seconds: 3600
  security:
    jwt:
      secret: change-me-with-a-32-byte-secret-value
      expiration-ms: 86400000
      token-header: Authorization
      token-prefix: "Bearer "

ai:
  qwen:
    chat-api: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
    api-key: sk-69500d5de19748ecac6d27d4a9083b30
    chat-model: qwen3.6-plus
    chat-max-tokens: 220
    stream-connect-timeout: 8s
    stream-request-timeout: 80s

dify:
  base-url: http://localhost
  api-key: app-brUWNXBqSB0sM0w5VfKDTTG7
  workflow-run-path: /v1/workflows/run
  response-mode: blocking

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  mapper-locations: classpath*:mapper/**/*.xml

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: subject
  preview-expiry-days: 7

practice:
  mastery:
    min-sample-count: 20
    rate-level-1: 60
    rate-level-2: 75
    rate-level-3: 90
    warmup-level-cap: 2
  draft:
    redis-key-prefix: "practice:draft:v2:"
    cache-ttl-days: 7
    save-lock-ttl-seconds: 5
    sync-batch-size: 50
    db-sync-interval-ms: 300000
    db-sync-initial-delay-ms: 300000
